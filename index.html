<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>FocusBond — Login</title>
  <link rel="stylesheet" href="./css/global.css">
  <link rel="stylesheet" href="./css/components.css">
  <link rel="stylesheet" href="./css/layout.css">
  <link rel="stylesheet" href="./css/pages/auth.css">
</head>
<body>
  <div class="container auth-page">
    <div class="page-content">
      <h1 class="auth-title">Login</h1>

      <form id="loginForm" class="auth-form" novalidate>
        <div class="input-group">
          <label for="email">Username or email</label>
          <input type="text" id="email" class="input" data-field="email" placeholder="Enter your email" autocomplete="email">
        </div>

        <div class="input-group">
          <label for="password">Password</label>
          <input type="password" id="password" class="input" data-field="password" placeholder="Enter your password" autocomplete="current-password">
        </div>

        <div class="auth-actions">
          <button type="submit" class="btn btn-primary btn-block">Login</button>
          <a href="./pages/register.html" class="btn btn-secondary btn-block">Create Account</a>
        </div>
      </form>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="./js/config.js"></script>
  <script src="./js/supabase.js"></script>
  <script src="./js/utils/storage.js"></script>
  <script src="./js/utils/dom.js"></script>
  <script src="./js/utils/validation.js"></script>
  <script src="./js/services/auth.js"></script>
  <script src="./js/app.js"></script>
  <script src="./js/pages/login.js"></script>
</body>
</html>
