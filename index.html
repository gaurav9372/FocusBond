<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>FocusBond — Login</title>
  <link rel="stylesheet" href="./css/global.css">
  <link rel="stylesheet" href="./css/components.css">
  <link rel="stylesheet" href="./css/layout.css">
  <link rel="stylesheet" href="./css/pages/auth.css">
</head>
<body>
  <div class="container auth-page">
    <div class="page-content">
      <div class="app-branding">
        <h1 class="app-name">FocusBond</h1>
        <p class="app-version">Version 0.5 - Beta</p>
      </div>
      <h2 class="auth-title">Login</h2>

      <form id="loginForm" class="auth-form" novalidate>
        <div class="input-group">
          <label for="email">Username or email</label>
          <input type="text" id="email" class="input" data-field="email" placeholder="Enter your email" autocomplete="email">
        </div>

        <div class="input-group">
          <label for="password">Password</label>
          <div class="password-wrapper">
            <input type="password" id="password" class="input" data-field="password" placeholder="Enter your password" autocomplete="current-password">
            <button type="button" class="eye-toggle" data-target="password" aria-label="Toggle password visibility">
              <svg class="eye-icon eye-open" viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
              <svg class="eye-icon eye-closed" viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" style="display:none"><path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"/><line x1="1" y1="1" x2="23" y2="23"/></svg>
            </button>
          </div>
        </div>

        <div class="auth-actions">
          <button type="submit" class="btn btn-primary btn-block">Login</button>
          <a href="./pages/register.html" class="btn btn-secondary btn-block">Create Account</a>
        </div>
      </form>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="./js/config.js"></script>
  <script src="./js/supabase.js"></script>
  <script src="./js/utils/storage.js"></script>
  <script src="./js/utils/dom.js"></script>
  <script src="./js/utils/validation.js"></script>
  <script src="./js/services/auth.js"></script>
  <script src="./js/app.js"></script>
  <script src="./js/pages/login.js"></script>
</body>
</html>
