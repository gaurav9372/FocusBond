<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>FocusBond — Home</title>
  <link rel="stylesheet" href="../css/global.css">
  <link rel="stylesheet" href="../css/components.css">
  <link rel="stylesheet" href="../css/layout.css">
  <link rel="stylesheet" href="../css/pages/home.css">
</head>
<body>
  <div class="container">
    <!-- Header -->
    <div class="page-header">
      <div>
        <span class="page-header__brand">FocusBond 0.5 - Beta</span>
      </div>
      <div class="page-header__actions">
        <div class="avatar-menu">
          <button class="avatar avatar-md" id="avatarBtn" aria-label="User menu"></button>
          <div class="avatar-menu__dropdown hidden" id="avatarDropdown">
            <a href="./profile.html" class="avatar-menu__item">Edit Profile</a>
            <button class="avatar-menu__item" disabled>Settings (Coming Soon)</button>
            <hr class="divider">
            <button class="avatar-menu__item avatar-menu__item--danger" id="logoutBtn">Logout</button>
          </div>
        </div>
      </div>
    </div>

    <!-- Welcome -->
    <div class="page-content">
      <h2 class="home-welcome">Welcome, <span id="userName">User</span></h2>

      <!-- Session Requests -->
      <div class="home-section">
        <h3 class="home-section__title">New Session Requests</h3>
        <div id="sessionRequests" class="home-requests">
          <div class="home-empty">No pending session requests</div>
        </div>
      </div>

      <!-- Past Sessions -->
      <div class="home-section">
        <h3 class="home-section__title">Past Sessions</h3>
        <div id="pastSessions" class="home-requests">
          <div class="home-empty">No past sessions yet</div>
        </div>
      </div>
    </div>

    <!-- Footer -->
    <div class="page-footer home-footer">
      <button class="btn btn-primary btn-block" id="newSessionBtn">New Session</button>
      <a href="./friends.html" class="btn btn-secondary btn-block btn-with-dot" id="manageFriendsBtn">
        Manage Friends
        <span class="notif-dot hidden" id="friendsDot"></span>
      </a>
    </div>

    <!-- New Session Modal -->
    <div class="modal-overlay hidden" id="newSessionModal">
      <div class="modal">
        <div class="modal__header">
          <h2 class="modal__title">New Session</h2>
          <button class="modal__close" id="sessionModalClose" aria-label="Close">&times;</button>
        </div>
        <div class="modal__body">
          <div class="input-group">
            <label>Choose Friend</label>
            <div class="custom-dropdown" id="friendDropdown">
              <button type="button" class="custom-dropdown__trigger" id="friendDropdownTrigger">
                <span class="custom-dropdown__text">Select a friend</span>
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="6 9 12 15 18 9"/></svg>
              </button>
              <div class="custom-dropdown__menu hidden" id="friendDropdownMenu"></div>
            </div>
          </div>
          <div class="input-group">
            <label for="sessionDuration">Duration (minutes)</label>
            <input type="number" id="sessionDuration" class="input" value="1" min="1" max="480" step="1">
          </div>
          <button class="btn btn-primary btn-block" id="sendSessionBtn" disabled>Send Session Request</button>
        </div>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="../js/config.js"></script>
  <script src="../js/supabase.js"></script>
  <script src="../js/utils/storage.js"></script>
  <script src="../js/utils/dom.js"></script>
  <script src="../js/utils/time.js"></script>
  <script src="../js/services/auth.js"></script>
  <script src="../js/services/friends.js"></script>
  <script src="../js/app.js"></script>
  <script src="../js/pages/home.js"></script>
</body>
</html>
