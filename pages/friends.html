<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>FocusBond — My Friends</title>
  <link rel="stylesheet" href="../css/global.css">
  <link rel="stylesheet" href="../css/components.css">
  <link rel="stylesheet" href="../css/layout.css">
  <link rel="stylesheet" href="../css/pages/friends.css">
</head>
<body>
  <div class="container has-bottom-nav">
    <!-- Header -->
    <div class="page-header">
      <h1 class="page-header__title">My Friends</h1>
      <div class="page-header__actions">
        <a href="./add-friend.html" class="icon-btn" aria-label="Add Friend">+</a>
      </div>
    </div>

    <!-- Friends List -->
    <div class="page-content">
      <div id="friendsList" class="friends-list">
        <!-- Dynamic: friend rows rendered here -->
        <div class="friends-empty">No friends yet. Tap + to add friends!</div>
      </div>
    </div>

    <nav class="bottom-nav" aria-label="Primary">
      <a href="./home.html" class="bottom-nav__item">
        <img src="../assets/icons/Frame.svg" class="bottom-nav__icon" alt="" aria-hidden="true">
        <span>Home</span>
      </a>
      <a href="./report.html" class="bottom-nav__item">
        <img src="../assets/icons/Frame-1.svg" class="bottom-nav__icon" alt="" aria-hidden="true">
        <span>Report</span>
      </a>
      <a href="./friends.html" class="bottom-nav__item active">
        <img src="../assets/icons/Frame-2.svg" class="bottom-nav__icon" alt="" aria-hidden="true">
        <span>Friends</span>
      </a>
      <a href="./notifications.html" class="bottom-nav__item">
        <img src="../assets/icons/Frame-3.svg" class="bottom-nav__icon" alt="" aria-hidden="true">
        <span>Notifications</span>
      </a>
    </nav>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="../js/config.js"></script>
  <script src="../js/supabase.js"></script>
  <script src="../js/utils/storage.js"></script>
  <script src="../js/utils/dom.js"></script>
  <script src="../js/services/auth.js"></script>
  <script src="../js/services/friends.js"></script>
  <script src="../js/app.js"></script>
  <script src="../js/pages/friends.js"></script>
</body>
</html>
