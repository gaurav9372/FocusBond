<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>FocusBond — Create Account</title>
  <link rel="stylesheet" href="../css/global.css">
  <link rel="stylesheet" href="../css/components.css">
  <link rel="stylesheet" href="../css/layout.css">
  <link rel="stylesheet" href="../css/pages/auth.css">
</head>
<body>
  <div class="container auth-page">
    <div class="page-content">
      <h1 class="auth-title">Create Account</h1>

      <form id="registerForm" class="auth-form" novalidate>
        <div class="input-group">
          <label for="name">Name</label>
          <input type="text" id="name" class="input" data-field="name" placeholder="Enter your name" autocomplete="name" maxlength="30">
        </div>

        <div class="input-group">
          <label for="username">Username</label>
          <input type="text" id="username" class="input" data-field="username" placeholder="Choose a username" autocomplete="username" maxlength="15">
        </div>

        <div class="input-group">
          <label for="email">Email</label>
          <input type="email" id="email" class="input" data-field="email" placeholder="Enter your email" autocomplete="email">
        </div>

        <div class="input-group">
          <label for="password">Enter Password</label>
          <input type="password" id="password" class="input" data-field="password" placeholder="Create a password" autocomplete="new-password">
        </div>

        <div class="input-group">
          <label for="confirmPassword">Re-enter Password</label>
          <input type="password" id="confirmPassword" class="input" data-field="confirmPassword" placeholder="Confirm your password" autocomplete="new-password">
        </div>

        <div class="auth-actions">
          <button type="submit" class="btn btn-primary btn-block">Submit</button>
          <a href="../index.html" class="btn btn-secondary btn-block">Login</a>
        </div>
      </form>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="../js/config.js"></script>
  <script src="../js/supabase.js"></script>
  <script src="../js/utils/storage.js"></script>
  <script src="../js/utils/dom.js"></script>
  <script src="../js/utils/validation.js"></script>
  <script src="../js/services/auth.js"></script>
  <script src="../js/app.js"></script>
  <script src="../js/pages/register.js"></script>
</body>
</html>
